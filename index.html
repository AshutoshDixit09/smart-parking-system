<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1 align="center">Welcome to VIT Vellore</h1>
<p align="center">Smart Parking Management System</p>
<div id="box">
<img src="vit.png" class="logo">
<h2>Sign in with email</h2>
<p class="subtitle">Smart Parking - VIT Vellore</p>
<input type="email" id="email" placeholder="Enter VIT Email">
<input type="password" id="password" placeholder="Password">
<select id="role">
    <option>Student</option>
    <option>Faculty</option>
    <option>Admin Staff</option>
</select>
<button onclick="login()" id="go">Get Started</button>
</div>
<script src="app.js"></script>
</body>
</html>
