<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="loadDashboard()">
<nav class="navbar">

  <div class="nav-left">
    <img src="vit.png" class="logo-img">
    <span class="brand">Smart Parking</span>
  </div>

  <div class="nav-right">
    <span id="userRole"></span>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>

</nav>

<h1 style="text-align:center;">Select Parking Area</h1>

<div class="search-container">
  <input id="search" placeholder="🔍 Search parking..." onkeyup="searchParking()">
</div>

<div id="parkingAreas" class="area-container"></div>

<script src="app.js"></script>

</body>
</html>
