<!DOCTYPE html>
<html>
<head>
  <title>Parking</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="initParking()">
<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <div class="logo-circle"></div>
    <span class="brand">Smart Parking</span>
  </div>

  <div class="nav-right">
    <span id="userRole"></span>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>
</nav>

<div class="main-container">

  <!-- LEFT -->
  <div class="left-panel">
    <h2 id="areaTitle"></h2>

    <p id="availableCount"></p>

    <div id="parkingGrid"></div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <h3 id="selectedSlot">No Slot Selected</h3>

    <select id="timeSlot">
      <option value="2">2 Hours</option>
      <option value="4">4 Hours</option>
      <option value="6">6 Hours</option>
    </select>
    <label>Start Time:</label>
    <input type="time" id="startTime" min="07:00" max="19:00">

    <label>End Time:</label>
    <input type="time" id="endTime" min="07:00" max="19:00">
    <button onclick="confirmBooking()">Confirm Booking</button>

  </div>

</div>

<h2 style="margin:20px;">Booking History</h2>

<table id="historyTable">
  <thead>
    <tr>
      <th>Slot</th>
      <th>Area</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
